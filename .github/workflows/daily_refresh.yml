name: Daily Refresh

on:
  schedule:
    - cron: "10 12 * * *"  # runs daily at 12:10 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh data + ratings
        run: |
          python -m src.fetch_current_season
          python -m src.ratings

      - name: Commit updated CSVs (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.csv data/processed/**/*.csv || true
          git commit -m "Daily refresh data" || echo "No changes to commit"
          git push
