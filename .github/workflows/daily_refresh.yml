name: Daily refresh

on:
  schedule:
    - cron: "0 13 * * *"   # runs every day at 13:00 UTC (~8am Indiana time)
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh data and ratings
        run: |
          python -m src.fetch_scores
          python -m src.net_pull
          python -m src.ratings
          python -m src.elo_net_adjust

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/processed/*.csv
          git commit -m "Daily data refresh" || echo "No changes to commit"
          git push
